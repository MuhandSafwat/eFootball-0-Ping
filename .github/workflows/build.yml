name: Build Android APK (Final Fixed Version)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Project Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: gradle

    - name: Check and Force Generate Gradle Wrapper if Missing
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi

    - name: Generate Auto Debug Keystore (Fix Signing Error)
      run: |
        # توليد ملف مفتاح التوقيع الافتراضي لحل مشكلة validateSigningDebug
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        # إذا كان مشروعك يبحث عنه داخل مجلد app، ننسخه هناك أيضاً للاحتياط
        if [ -d "app" ]; then
          cp debug.keystore app/debug.keystore
        fi

    - name: Fix Execution Permissions
      run: |
        chmod +x gradlew || true

    - name: Clean and Build Debug APK
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Upload and Deliver Final APK
      uses: actions/upload-artifact@v4
      with:
        name: eFootball-Zero-Ping-V2
        path: "**/build/outputs/apk/debug/app-debug.apk"
        if-no-files-found: error
